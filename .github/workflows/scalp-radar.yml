name: Hızlı Scalp Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "4-59/5 * * * *"

permissions:
  contents: write

concurrency:
  group: hizli-scalp-radar
  cancel-in-progress: true

jobs:
  scalp-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Hızlı scalp radar çalıştır
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scalp_radar.py

      - name: Scalp durum dosyasını kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git pull --rebase --autostash origin main || echo "Pull skipped"

          git add scalp_radar_state.json
          git diff --cached --quiet || git commit -m "Update scalp radar state"

          git pull --rebase --autostash origin main || echo "Pull skipped before push"
          git push || echo "Push skipped"
