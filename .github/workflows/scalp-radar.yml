name: Hızlı Scalp Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "4-59/5 * * * *"

permissions:
  contents: write

concurrency:
  group: hizli-scalp-radar
  cancel-in-progress: false

jobs:
  scalp-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Repo indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Hızlı scalp radar çalıştır
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scalp_radar.py

      - name: Scalp durum dosyasını güvenli kaydet
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add scalp_radar_state.json

          if git diff --cached --quiet; then
            echo "Scalp durum dosyasında kaydedilecek değişiklik yok."
            exit 0
          fi

          git commit -m "Update scalp radar state"

          for attempt in 1 2 3
          do
            echo "Push denemesi: $attempt"

            git pull --rebase --autostash origin main

            if git push origin HEAD:main
            then
              echo "Scalp durum dosyası başarıyla kaydedildi."
              exit 0
            fi

            sleep 10
          done

          echo "Scalp durum dosyası üç denemede de kaydedilemedi."
          exit 1
