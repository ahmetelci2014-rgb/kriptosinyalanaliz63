name: Premium MTF Futures Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: premium-mtf-futures-bot
  cancel-in-progress: false

jobs:
  signal-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Repo indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Botu çalıştır
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Durum dosyalarını kaydet
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add open_signals.json performance.json last_signals.json

          if git diff --cached --quiet; then
            echo "Kaydedilecek yeni durum değişikliği yok."
            exit 0
          fi

          git commit -m "Update main bot state"

          for attempt in 1 2 3
          do
            echo "Push denemesi: $attempt"

            git pull --rebase --autostash origin main

            if git push origin HEAD:main
            then
              echo "Durum dosyaları başarıyla kaydedildi."
              exit 0
            fi

            sleep 10
          done

          echo "Durum dosyaları üç denemede de kaydedilemedi."
          exit 1
