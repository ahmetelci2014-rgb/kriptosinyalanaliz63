name: Kripto Sinyal Botu

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  bot:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Paketleri yükle
        run: |
          pip install -r requirements.txt

      - name: Botu çalıştır
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
