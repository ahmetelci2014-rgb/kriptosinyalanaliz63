name: Premium GitHub V4

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: premium-github-v4
  cancel-in-progress: true

jobs:
  signal-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          pip install -r requirements.txt

      - name: Botu çalıştır
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Durum dosyalarını kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add open_signals.json performance.json last_signals.json
          git diff --cached --quiet || git commit -m "Update bot state"
          git push
