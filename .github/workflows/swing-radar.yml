name: Swing Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

concurrency:
  group: swing-radar
  cancel-in-progress: false

jobs:
  run-swing-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Repo indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install ccxt pandas requests
          fi

      - name: Swing Radar çalıştır
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python swing_radar.py

      - name: Swing durum dosyasını güvenli kaydet
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add swing_radar_state.json

          if git diff --cached --quiet; then
            echo "Swing durum dosyasında kaydedilecek değişiklik yok."
            exit 0
          fi

          git commit -m "Update swing radar state"

          for attempt in 1 2 3
          do
            echo "Push denemesi: $attempt"

            git pull --rebase --autostash origin main

            if git push origin HEAD:main
            then
              echo "Swing durum dosyası başarıyla kaydedildi."
              exit 0
            fi

            sleep 10
          done

          echo "Swing durum dosyası üç denemede de kaydedilemedi."
          exit 1
