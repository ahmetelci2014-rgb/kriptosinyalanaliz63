name: Backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install pandas ta ccxt requests

      - name: Backtest çalıştır
        run: python backtest.py

      - name: Backtest raporlarını yükle
        uses: actions/upload-artifact@v4
        with:
          name: backtest-raporlari
          path: |
            backtest_report.txt
            backtest_trades.json
