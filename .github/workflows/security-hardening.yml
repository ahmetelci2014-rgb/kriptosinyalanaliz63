name: Tek Seferlik Güvenlik Sertleştirmesi

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: security-hardening-once
  cancel-in-progress: false

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repo indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Güvenlik yamalarını uygula ve doğrula
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path
          import compileall
          import re

          def replace_text(path: str, old: str, new: str, label: str) -> None:
              file_path = Path(path)
              if not file_path.exists():
                  raise SystemExit(f"{path} bulunamadı: {label}")

              text = file_path.read_text(encoding="utf-8")

              if old in text:
                  count = text.count(old)
                  file_path.write_text(
                      text.replace(old, new),
                      encoding="utf-8",
                  )
                  print(f"Uygulandı: {label} ({count} eşleşme)")
                  return

              if new in text:
                  print(f"Zaten uygulanmış: {label}")
                  return

              raise SystemExit(
                  f"{path}: '{label}' için eski veya yeni metin bulunamadı"
              )

          def regex_replace_expected(
              path: str,
              pattern: str,
              replacement: str,
              already_pattern: str,
              expected_count: int,
              label: str,
          ) -> None:
              file_path = Path(path)
              if not file_path.exists():
                  raise SystemExit(f"{path} bulunamadı: {label}")

              text = file_path.read_text(encoding="utf-8")
              updated, count = re.subn(
                  pattern,
                  replacement,
                  text,
                  flags=re.MULTILINE,
              )

              if count == expected_count:
                  file_path.write_text(updated, encoding="utf-8")
                  print(f"Uygulandı: {label} ({count} eşleşme)")
                  return

              if count == 0:
                  already_count = len(
                      re.findall(
                          already_pattern,
                          text,
                          flags=re.MULTILINE,
                      )
                  )
                  if already_count >= expected_count:
                      print(f"Zaten uygulanmış: {label}")
                      return

              raise SystemExit(
                  f"{path}: '{label}' için beklenen {expected_count}, "
                  f"bulunan {count} eşleşme"
              )

          # Telegram yanıtının tüm JSON gövdesini Actions loguna yazma.
          for path, old, new in [
              (
                  "main.py",
                  'print("Telegram cevap:", response.status_code, response.text)',
                  'print("Telegram cevap:", response.status_code)',
              ),
              (
                  "scalp_radar.py",
                  'print("Telegram cevap:", response.status_code, response.text)',
                  'print("Telegram cevap:", response.status_code)',
              ),
              (
                  "pump_radar.py",
                  'print("Telegram cevap:", response.status_code, response.text)',
                  'print("Telegram cevap:", response.status_code)',
              ),
              (
                  "swing_radar.py",
                  'print("Telegram cevap:", response.status_code, response.text)',
                  'print("Telegram cevap:", response.status_code)',
              ),
              (
                  "coin_analyzer.py",
                  'print("Telegram cevap:", r.status_code, r.text)',
                  'print("Telegram cevap:", r.status_code)',
              ),
          ]:
              replace_text(
                  path,
                  old,
                  new,
                  f"{path} Telegram log gizliliği",
              )

          # Pump/Dump: rapor şartı ile gerçek hard filter aynı olsun.
          # LONG için hem 5M hareket hem direnç kırılımı zorunlu.
          regex_replace_expected(
              "pump_radar.py",
              r"move5\s*>=\s*MIN_5M_MOVE\s*or\s*breakout",
              "move5 >= MIN_5M_MOVE and breakout",
              r"move5\s*>=\s*MIN_5M_MOVE\s*and\s*breakout",
              2,
              "Pump LONG 5M hareket + direnç kırılımı",
          )

          # SHORT için hem 5M hareket hem destek kırılımı zorunlu.
          regex_replace_expected(
              "pump_radar.py",
              r"move5\s*<=\s*-MIN_5M_MOVE\s*or\s*breakdown",
              "move5 <= -MIN_5M_MOVE and breakdown",
              r"move5\s*<=\s*-MIN_5M_MOVE\s*and\s*breakdown",
              2,
              "Dump SHORT 5M hareket + destek kırılımı",
          )

          replace_text(
              "pump_radar.py",
              "PUMP: 5M hareket veya kırılım yok",
              "PUMP: 5M hareket veya direnç kırılımı yok",
              "Pump rapor açıklaması",
          )

          replace_text(
              "pump_radar.py",
              "DUMP: 5M hareket veya kırılım yok",
              "DUMP: 5M hareket veya destek kırılımı yok",
              "Dump rapor açıklaması",
          )

          pump_text = Path("pump_radar.py").read_text(encoding="utf-8")

          if re.search(
              r"move5\s*>=\s*MIN_5M_MOVE\s*or\s*breakout",
              pump_text,
          ):
              raise SystemExit("Pump LONG gevşek OR şartı hâlâ mevcut.")

          if re.search(
              r"move5\s*<=\s*-MIN_5M_MOVE\s*or\s*breakdown",
              pump_text,
          ):
              raise SystemExit("Dump SHORT gevşek OR şartı hâlâ mevcut.")

          if len(re.findall(
              r"move5\s*>=\s*MIN_5M_MOVE\s*and\s*breakout",
              pump_text,
          )) < 2:
              raise SystemExit("Pump LONG zorunlu kırılım doğrulanamadı.")

          if len(re.findall(
              r"move5\s*<=\s*-MIN_5M_MOVE\s*and\s*breakdown",
              pump_text,
          )) < 2:
              raise SystemExit("Dump SHORT zorunlu kırılım doğrulanamadı.")

          # Güncel dosyalarda düz metin Telegram tokenı veya
          # Python içinde sabit sayısal CHAT_ID varsa commit etmeden dur.
          token_pattern = re.compile(
              r"(?<![A-Za-z0-9_])\d{8,12}:[A-Za-z0-9_-]{25,}"
              r"(?![A-Za-z0-9_])"
          )
          chat_id_pattern = re.compile(
              r"^\s*CHAT_ID\s*=\s*[\"']?\d{6,}[\"']?\s*$",
              re.MULTILINE,
          )

          scan_extensions = {
              ".py", ".yml", ".yaml", ".json", ".md", ".txt",
          }
          findings = []

          for path in Path(".").rglob("*"):
              if (
                  not path.is_file()
                  or ".git" in path.parts
                  or path.suffix.lower() not in scan_extensions
              ):
                  continue

              text = path.read_text(
                  encoding="utf-8",
                  errors="ignore",
              )

              if token_pattern.search(text):
                  findings.append(
                      f"{path}: olası düz metin Telegram tokenı"
                  )

              if (
                  path.suffix.lower() == ".py"
                  and chat_id_pattern.search(text)
              ):
                  findings.append(
                      f"{path}: sayısal CHAT_ID sabiti"
                  )

          if findings:
              print("GÜVENLİK TARAMASI BAŞARISIZ:")
              for finding in findings:
                  print("-", finding)
              raise SystemExit(1)

          if not compileall.compile_dir(".", quiet=1):
              raise SystemExit("Python sözdizimi kontrolü başarısız.")

          # Başarılı olunca tek kullanımlık workflow kendisini siler.
          self_path = Path(
              ".github/workflows/security-hardening.yml"
          )
          if self_path.exists():
              self_path.unlink()
              print(
                  "Tek kullanımlık workflow silinmek üzere işaretlendi."
              )

          print("Güvenlik sertleştirmesi ve kontroller başarılı.")
          PY

      - name: Değişiklikleri güvenli kaydet
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add \
            main.py \
            coin_analyzer.py \
            scalp_radar.py \
            pump_radar.py \
            swing_radar.py \
            .github/workflows/security-hardening.yml

          if git diff --cached --quiet; then
            echo "Kaydedilecek güvenlik değişikliği yok."
            exit 0
          fi

          git commit -m "Harden Telegram logs and pump dump filters"

          for attempt in 1 2 3
          do
            echo "Push denemesi: $attempt"
            git pull --rebase --autostash origin main

            if git push origin HEAD:main
            then
              echo "Güvenlik sertleştirmesi başarıyla kaydedildi."
              exit 0
            fi

            sleep 10
          done

          echo "Güvenlik değişiklikleri üç denemede de kaydedilemedi."
          exit 1
