name: Coin Detay Analizi

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Analiz edilecek coin. Örnek: BTCUSDT, SOLUSDT, API3USDT"
        required: true
        default: "BTCUSDT"

jobs:
  coin-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          pip install -r requirements.txt

      - name: Coin analizi çalıştır
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SYMBOL: ${{ github.event.inputs.symbol }}
        run: python coin_analyzer.py
